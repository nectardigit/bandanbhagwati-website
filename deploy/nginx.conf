# ============================================================
#  Hardened Nginx vhost for Bandan Bhagwati (Laravel)
#  Apply on the server, then: nginx -t && systemctl reload nginx
#  Rollback: restore the previous file in sites-available + reload.
# ============================================================

# --- HTTP: redirect everything to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name bandanbhagwati.com www.bandanbhagwati.com;
    return 301 https://bandanbhagwati.com$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bandanbhagwati.com www.bandanbhagwati.com;

    # Redirect www -> apex (canonical host)
    if ($host = www.bandanbhagwati.com) { return 301 https://bandanbhagwati.com$request_uri; }

    # Document root MUST be the public/ folder (never the project root —
    # otherwise .env, vendor/, storage/ become web-reachable).
    root /var/www/bandanbhagwati/public;
    index index.php;

    # ---- TLS ----
    ssl_certificate     /etc/letsencrypt/live/bandanbhagwati.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bandanbhagwati.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ---- Security headers (CSP lives here; tune as needed) ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Permissive-but-present CSP: the site uses inline styles/handlers + external fonts/images.
    # Tighten over time (move inline JS to files, then drop 'unsafe-inline' for script-src).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; media-src 'self' https:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    server_tokens off;
    client_max_body_size 110M;     # matches lfm max upload; lower if you can
    autoindex off;                 # no directory listing

    # ---- Laravel front controller ----
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_hide_header X-Powered-By;
    }

    # ---- HARD BLOCK: no PHP execution in writable/upload/vendor dirs ----
    # Even if an attacker plants a .php in storage or an upload folder, it can't run.
    location ~* ^/storage/.*\.php$  { deny all; return 403; }
    location ~* ^/vendor/.*\.php$   { deny all; return 403; }
    location ~* ^/uploads/.*\.php$  { deny all; return 403; }

    # ---- Deny dotfiles, env, vcs, backups, dumps ----
    location ~ /\.(?!well-known).* { deny all; return 404; }
    location ~* \.(env|git|gitignore|lock|sql|sqlite|bak|old|swp|dist|ini|sh|log)$ { deny all; return 404; }
    location ^~ /.git/        { deny all; return 404; }
    location ^~ /storage/app/ { deny all; return 404; }   # private app storage (only /storage symlink to public is served)

    # ---- Cache static assets ----
    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|svg|ico|woff2?|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Optional: restrict the admin panel to your office/VPN IPs (uncomment + set IPs)
    # location ^~ /admin {
    #     allow 1.2.3.4;        # your static IP
    #     deny all;
    #     try_files $uri $uri/ /index.php?$query_string;
    # }
}
